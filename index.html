<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돌고래하우스 | 신축빌라 매칭</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap');
:root{
  --bg:#0a1628;--panel:#111f35;--card:#152540;--border:#1e3a5f;
  --text:#e8f1ff;--muted:#7a9cc0;
  --teal:#00c9a7;--gold:#f4a442;--purple:#9b5de5;
  --green:#2dc653;--red:#e63946;--blue:#1e5fa8;--cyan:#00b4d8;
  --navy:#0d1b2a;--orange:#ff6b35;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:linear-gradient(90deg,var(--navy),#0d2240);border-bottom:2px solid var(--teal);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--teal);letter-spacing:2px;}
.logo span{color:var(--gold);}
.badge-new{font-size:9px;background:var(--teal);color:var(--navy);border-radius:4px;padding:2px 7px;font-weight:900;letter-spacing:.5px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:11px;display:flex;align-items:center;gap:5px;}
.sc .n{font-weight:900;font-size:13px;}
.topbar-r{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--teal);color:var(--teal);}
.tbtn.add{background:var(--teal);border-color:var(--teal);color:var(--navy);}
.tbtn.add:hover{opacity:.85;}

/* TABS */
.tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;}
.tab{padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);transition:all .15s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

.content{flex:1;overflow:hidden;display:flex;}
.pane{display:none;flex:1;overflow:hidden;}
.pane.active{display:flex;}

/* ══ 손님 매칭 탭 ══ */
.match-wrap{flex:1;display:flex;overflow:hidden;}

/* 왼쪽 손님 패널 */
.cust-col{width:255px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.cust-col-head{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cust-col-title{font-size:11px;font-weight:900;color:var(--teal);margin-bottom:7px;display:flex;justify-content:space-between;}
.c-search{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 9px;font-size:11px;font-family:inherit;width:100%;margin-bottom:6px;}
.c-search:focus{outline:none;border-color:var(--teal);}
.c-chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;color:var(--muted);font-family:inherit;}
.chip.on{background:rgba(0,201,167,.2);border-color:var(--teal);color:var(--teal);font-weight:700;}
.cust-list-scroll{flex:1;overflow-y:auto;}
.cust-list-scroll::-webkit-scrollbar{width:3px;}
.cust-list-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.ci{padding:9px 12px;border-bottom:1px solid rgba(30,58,95,.5);cursor:pointer;transition:background .1s;}
.ci:hover{background:rgba(0,201,167,.06);}
.ci.sel{background:rgba(0,201,167,.12);border-left:3px solid var(--teal);}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.ci-phone{font-size:12px;font-weight:700;}
.ci-pri{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;}
.p-red{background:rgba(230,57,70,.2);color:var(--red);}
.p-or{background:rgba(255,107,53,.2);color:var(--orange);}
.p-ye{background:rgba(244,164,66,.2);color:var(--gold);}
.p-gr{background:rgba(100,120,150,.2);color:var(--muted);}
.ci-region{font-size:10px;color:var(--muted);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-note{font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* 가운데 매칭 결과 */
.match-center{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.match-top{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.no-sel-msg{padding:50px;text-align:center;color:var(--muted);font-size:13px;}
.sel-info{display:none;}
.sel-info.on{display:block;}
.si-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.si-phone{font-size:15px;font-weight:900;}
.si-region{font-size:11px;color:var(--muted);}
.si-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
.si-chip{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11px;}
.si-chip span{color:var(--muted);font-size:10px;}
.si-note{font-size:11px;color:var(--gold);background:rgba(244,164,66,.08);border:1px solid rgba(244,164,66,.2);border-radius:6px;padding:6px 10px;line-height:1.6;}

/* 분석 바 */
.analysis-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.ab{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;}
.ab.ok{border-color:rgba(45,198,83,.4);background:rgba(45,198,83,.08);}
.ab.warn{border-color:rgba(244,164,66,.4);background:rgba(244,164,66,.08);}
.ab.bad{border-color:rgba(230,57,70,.4);background:rgba(230,57,70,.08);}

/* 결과 스크롤 */
.match-scroll{flex:1;overflow-y:auto;padding:10px 14px;}
.match-scroll::-webkit-scrollbar{width:4px;}
.match-scroll::-webkit-scrollbar-thumb{background:var(--border);}

/* 섹션 헤더 */
.sec-hd{display:flex;align-items:center;gap:7px;margin:12px 0 7px;padding:7px 11px;border-radius:8px;font-size:12px;font-weight:700;}
.sec-zero{background:rgba(45,198,83,.1);border:1px solid rgba(45,198,83,.25);color:var(--green);}
.sec-low{background:rgba(0,201,167,.1);border:1px solid rgba(0,201,167,.25);color:var(--teal);}
.sec-mid{background:rgba(155,93,229,.1);border:1px solid rgba(155,93,229,.25);color:var(--purple);}
.sec-all{background:rgba(30,95,168,.12);border:1px solid rgba(30,95,168,.25);color:var(--cyan);}
.sec-old{background:rgba(230,57,70,.08);border:1px solid rgba(230,57,70,.3);color:var(--red);}

/* 매물 카드 (매칭 결과) */
.rc{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:all .12s;position:relative;}
.rc:hover{border-color:var(--teal);transform:translateX(2px);}
.rc.g1{border-color:var(--gold);background:rgba(244,164,66,.06);}
.rc.g2{border-color:var(--cyan);}
.rc.g3{border-color:var(--purple);}
.rc-rank{position:absolute;top:8px;right:10px;font-size:17px;}
.rc-name{font-size:13px;font-weight:900;margin-bottom:2px;}
.rc-region{font-size:10px;color:var(--muted);margin-bottom:6px;}
.rc-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.rc-price{font-size:16px;font-weight:900;color:var(--teal);}
.rc-monthly{font-size:11px;font-weight:700;}
.rc-mort{font-size:10px;color:var(--muted);margin-bottom:5px;}
.tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;}
.t-gr{background:rgba(45,198,83,.15);color:var(--green);}
.t-te{background:rgba(0,201,167,.15);color:var(--teal);}
.t-pu{background:rgba(155,93,229,.15);color:var(--purple);}
.t-go{background:rgba(244,164,66,.15);color:var(--gold);}
.t-re{background:rgba(230,57,70,.15);color:var(--red);}
.t-bl{background:rgba(30,95,168,.2);color:var(--cyan);}
.rc-why{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
.rc-why-item{font-size:10px;color:var(--muted);display:flex;gap:4px;}
.why-dot{color:var(--green);}

/* 구옥 추천 배너 */
.old-banner{background:rgba(230,57,70,.07);border:1px solid rgba(230,57,70,.3);border-radius:9px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:8px;}
.old-banner strong{color:var(--red);}

/* ══ 매물 탭 ══ */
.prop-wrap{flex:1;display:flex;overflow:hidden;}

/* 지역 사이드바 */
.region-sidebar{width:145px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.rsb-head{padding:10px 10px 6px;font-size:10px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
.rsb-scroll{flex:1;overflow-y:auto;}
.ri{padding:8px 10px;border-bottom:1px solid rgba(30,58,95,.4);cursor:pointer;transition:background .1s;}
.ri:hover{background:rgba(0,201,167,.07);}
.ri.sel{background:rgba(0,201,167,.14);border-left:3px solid var(--teal);}
.ri.lv1{padding-left:10px;font-weight:700;}
.ri.lv2{padding-left:18px;border-left:1px solid var(--border);}
.ri.lv2.sel{border-left:3px solid var(--teal);}
.ri.lv3{padding-left:26px;border-left:1px solid var(--border);}
.ri.lv3.sel{border-left:3px solid var(--teal);}
.ri-name{font-size:12px;font-weight:600;margin-bottom:1px;}
.ri-name.bold{font-weight:900;}
.ri-count{font-size:10px;color:var(--muted);}
.ri-arrow{float:right;font-size:10px;color:var(--muted);transition:transform .2s;}
.ri.open .ri-arrow{transform:rotate(90deg);}

/* 매물 메인 영역 */
.prop-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.prop-toolbar{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.prop-toolbar select,.prop-toolbar input{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:11px;font-family:inherit;}
.prop-toolbar input{width:150px;}
.prop-lc{margin-left:auto;font-size:11px;color:var(--muted);}
.prop-lc strong{color:var(--cyan);}

/* 매물 카드 그리드 */
.prop-grid{flex:1;overflow-y:auto;padding:12px;}
.prop-grid::-webkit-scrollbar{width:4px;}
.prop-grid::-webkit-scrollbar-thumb{background:var(--border);}
.prop-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.pc{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;}
.pc:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.pc-region{font-size:10px;color:var(--muted);margin-bottom:4px;}
.pc-name{font-size:14px;font-weight:900;margin-bottom:2px;}
.pc-addr{font-size:10px;color:var(--muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pc-price{font-size:18px;font-weight:900;color:var(--teal);}
.pc-monthly{font-size:11px;font-weight:700;margin-top:1px;margin-bottom:7px;}
.pc-mort{font-size:11px;color:var(--muted);}
.pc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;}
.pc-edit{position:absolute;top:10px;right:10px;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:3px 8px;font-size:10px;cursor:pointer;font-family:inherit;opacity:0;transition:opacity .15s;}
.pc:hover .pc-edit{opacity:1;}

/* 매물 폼 패널 */
.prop-form-col{width:290px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.pfc-head{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--teal);display:flex;align-items:center;justify-content:space-between;}
.pfc-body{flex:1;overflow-y:auto;padding:11px 13px;}
.pfc-body::-webkit-scrollbar{width:3px;}
.pfc-body::-webkit-scrollbar-thumb{background:var(--border);}
.ff{margin-bottom:9px;}
.ff label{font-size:10px;color:var(--muted);font-weight:700;display:block;margin-bottom:3px;}
.ff input,.ff select,.ff textarea{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 9px;font-size:12px;font-family:inherit;width:100%;}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--teal);}
.ff input::placeholder{color:var(--muted);opacity:.5;}
.ff textarea{resize:vertical;min-height:55px;}
.ff-row{display:flex;gap:6px;}
.ff-row .ff{flex:1;}
.ox{display:flex;gap:4px;}
.ox-btn{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .12s;font-family:inherit;}
.ox-btn.o.on{background:rgba(45,198,83,.2);border-color:var(--green);color:var(--green);}
.ox-btn.x.on{background:rgba(230,57,70,.1);border-color:var(--red);color:var(--red);}
.monthly-hint{background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.2);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--teal);font-weight:700;margin-bottom:9px;}
.monthly-hint small{display:block;color:var(--muted);font-size:9px;font-weight:400;margin-top:2px;}
.pfc-foot{padding:10px 13px;border-top:1px solid var(--border);display:flex;gap:6px;}
.btn-save{flex:1;background:var(--teal);border:none;color:var(--navy);border-radius:7px;padding:9px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;}
.btn-del{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:var(--red);border-radius:7px;padding:9px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ══ 지도 탭 ══ */
.map-wrap{flex:1;display:flex;overflow:hidden;}
.map-left-col{width:250px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.mlc-head{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mlc-title{font-size:11px;font-weight:900;color:var(--teal);margin-bottom:7px;}
.mlc-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.mlc-sel{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:11px;font-family:inherit;width:100%;}
.map-prop-list{flex:1;overflow-y:auto;}
.map-prop-list::-webkit-scrollbar{width:3px;}
.map-prop-list::-webkit-scrollbar-thumb{background:var(--border);}
.mpi{padding:9px 12px;border-bottom:1px solid rgba(30,58,95,.4);cursor:pointer;transition:background .1s;}
.mpi:hover{background:rgba(0,201,167,.07);}
.mpi-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.mpi-region{font-size:10px;color:var(--muted);margin-bottom:3px;}
.mpi-price{font-size:13px;font-weight:900;color:var(--teal);}
#mapEl{flex:1;}
.map-detail-col{width:240px;background:var(--panel);border-left:1px solid var(--border);display:none;flex-direction:column;overflow:hidden;flex-shrink:0;}
.map-detail-col.on{display:flex;}
.mdc-body{flex:1;overflow-y:auto;padding:13px;}
.mdc-body::-webkit-scrollbar{width:3px;}
.mdc-body::-webkit-scrollbar-thumb{background:var(--border);}
.map-close-btn{position:absolute;top:8px;right:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;z-index:5;}

/* ══ 고객DB 탭 ══ */
.cdb-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cdb-tb{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap;}
.cdb-tb select,.cdb-tb input{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 9px;font-size:11px;font-family:inherit;}
.cdb-scroll{flex:1;overflow:auto;}
.cdb-scroll::-webkit-scrollbar{width:4px;height:4px;}
.cdb-scroll::-webkit-scrollbar-thumb{background:var(--border);}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:900px;}
thead th{background:var(--panel);padding:7px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:5;}
tbody tr{border-bottom:1px solid rgba(30,58,95,.3);cursor:pointer;transition:background .1s;}
tbody tr:hover{background:rgba(0,201,167,.06);}
tbody td{padding:7px 9px;vertical-align:middle;}

/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.on{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:22px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;position:relative;}
.modal-box::-webkit-scrollbar{width:4px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--border);}
.modal-x{position:absolute;top:10px;right:12px;background:var(--card);border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;}

/* Confirm */
.cfm-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:none;align-items:center;justify-content:center;}
.cfm-bg.on{display:flex;}
.cfm-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px 28px;min-width:260px;text-align:center;}
.cfm-msg{font-size:14px;font-weight:700;margin-bottom:18px;}
.cfm-btns{display:flex;gap:9px;justify-content:center;}
.cfm-ok{background:var(--red);border:none;color:#fff;border-radius:7px;padding:9px 24px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.cfm-cancel{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:9px 24px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--green);color:#fff;padding:10px 22px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;transition:transform .25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}
@keyframes bounce{0%{transform:translateY(0) scale(1);}35%{transform:translateY(-14px) scale(1.12);}65%{transform:translateY(-4px) scale(1.05);}100%{transform:translateY(0) scale(1);}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">🐬 돌고래<span>하우스</span> <span class="badge-new">신축</span></div>
  <div class="sc">매물 <span class="n" id="stProp" style="color:var(--teal)">0</span></div>
  <div class="sc">전액대출 <span class="n" id="stZero" style="color:var(--green)">0</span></div>
  <div class="sc">소액실입 <span class="n" id="stLow" style="color:var(--cyan)">0</span></div>
  <div class="sc">고객 <span class="n" id="stCust" style="color:var(--gold)">0</span></div>
  <div class="topbar-r">

let props = JSON.parse(localStorage.getItem(PROP_KEY) || 'null') || INIT_PROPS;
let custs = JSON.parse(localStorage.getItem(CUST_KEY) || '[]');

function monthly(price, mort) {
  const loan = (price||0) - (mort||0);
  return loan > 0 ? Math.round(loan * 0.5 / 1000) / 10 : 0; // 만원
}

function saveProps() { try{localStorage.setItem(PROP_KEY,JSON.stringify(props));}catch(e){} updateStats(); }
function saveCusts() { try{localStorage.setItem(CUST_KEY,JSON.stringify(custs));}catch(e){} updateStats(); }

function updateStats() {
  document.getElementById('stProp').textContent = props.length;
  document.getElementById('stZero').textContent = props.filter(p=>p.mortgage===0).length;
  document.getElementById('stLow').textContent  = props.filter(p=>p.mortgage>0&&p.mortgage<=2000).length;
  document.getElementById('stCust').textContent  = custs.length;
}

function goTab(name, el) {
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pane'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  el.classList.add('active');
  if(name==='prop') { buildRegionSidebar(); renderPropGrid(); }
  if(name==='cust') renderCustDB();
  if(name==='map')  setTimeout(()=>{ initMap(); renderMap(); }, 80);
}

function setCF(btn, val) {
  document.querySelectorAll('.c-chips .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on'); cfFilter = val; renderCustList();
}

function renderCustList() {
  const kw = document.getElementById('custSearch').value.toLowerCase();
  const f = custs.filter(c => {
    if(cfFilter && !(c.priority||'').includes(cfFilter)) return false;
    if(kw && !c.phone.includes(kw) && !(c.region||'').toLowerCase().includes(kw)) return false;
    return true;
  });
  document.getElementById('custCnt').textContent = f.length+'명';
  const el = document.getElementById('custList');
  if(!f.length) { el.innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--muted)">없음</div>'; return; }
  el.innerHTML = f.map(c => {
    const pri = c.priority||'';
    const bc = pri.includes('🔴')?'p-red':pri.includes('🟠')?'p-or':pri.includes('🟡')?'p-ye':'p-gr';
    return `<div class="ci ${selCust&&selCust.id===c.id?'sel':''}" onclick="selectCust(${c.id})">
      <div class="ci-top"><span class="ci-phone">${c.phone}</span><span class="ci-pri ${bc}">${pri.replace(/[🔴🟠🟡❌✅]/g,'').trim().slice(0,5)}</span></div>
      <div class="ci-region">${c.region||'지역미정'}</div>
      <div class="ci-note">${(c.note||'').slice(0,35)}</div>
    </div>`;
  }).join('');
}

function selectCust(id) {
  selCust = custs.find(c=>c.id===id); if(!selCust) return;
  renderCustList();
  document.getElementById('noSel').style.display='none';
  document.getElementById('selInfo').classList.add('on');
  document.getElementById('siPhone').textContent = selCust.phone;
  document.getElementById('siRegion').textContent = selCust.region||'지역미정';
  const pri = selCust.priority||'';
  const bc = pri.includes('🔴')?'p-red':pri.includes('🟠')?'p-or':pri.includes('🟡')?'p-ye':'p-gr';
  document.getElementById('siBadge').className='ci-pri '+bc;
  document.getElementById('siBadge').textContent = pri;
  const chips = [];
  const c = selCust;
  if(c.kcb&&c.kcb!=='-') chips.push(`<div class="si-chip"><span>신용KCB</span> <strong>${c.kcb}</strong></div>`);
  if(c.debt&&c.debt!=='-') chips.push(`<div class="si-chip"><span>기대출</span> <strong>${c.debt}</strong></div>`);
  if(c.cash&&c.cash!=='-') chips.push(`<div class="si-chip"><span>가용현금</span> <strong>${c.cash}</strong></div>`);
  if(c.noinput==='O') chips.push(`<div class="si-chip" style="border-color:var(--green);color:var(--green)"><strong>✓ 무입주 희망</strong></div>`);
  if(c.schedule&&c.schedule!=='-') chips.push(`<div class="si-chip"><span>이사</span> <strong>${c.schedule}</strong></div>`);
  document.getElementById('siChips').innerHTML = chips.join('');
  document.getElementById('siNote').textContent = c.note||'특이사항 없음';
  runMatch();
}

// ════════════════════════════════════════
// 매칭 엔진
// ════════════════════════════════════════
function parseKcb(raw) {
  const m = (raw||'').match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}
function parseCash(raw) {
  const clean = (raw||'').replace(/[^\d]/g,'');
  return clean ? parseInt(clean) : 0;
}

function runMatch() {
  if(!selCust) return;
  const c = selCust;
  const region = (c.region||'').toLowerCase();
  const note   = (c.note||'').toLowerCase();
  const kcb    = parseKcb(c.kcb);
  const cash   = parseCash(c.cash);
  const wantsNoInput = c.noinput==='O'||note.includes('무입주')||note.includes('전액대출');
  const wantsDuplex  = note.includes('복층');
  const noDuplex     = note.includes('복층싫')||note.includes('복층x');

  // 신용 등급
  const creditOk    = kcb===0||kcb>=700;
  const creditMid   = kcb>=600&&kcb<700;
  const creditLow   = kcb>0&&kcb<600;
  const creditLabel = creditLow ? `<strong style="color:var(--red)">${kcb}점 (신용 컨설팅 필요)</strong>`
                    : creditMid ? `<strong style="color:var(--gold)">${kcb}점 (컨설팅 후 가능)</strong>`
                    : kcb>0 ? `<strong style="color:var(--green)">${kcb}점 (정상 진행 가능)</strong>`
                    : '<strong>미확인</strong>';

  // 분석 바
  const bars = [`<div class="ab ${creditLow?'bad':creditMid?'warn':'ok'}">신용 ${creditLabel}</div>`];
  if(cash>0) bars.push(`<div class="ab ok">현금 <strong>${cash.toLocaleString()}만</strong></div>`);
  if(wantsNoInput) bars.push(`<div class="ab ok">✓ 무입주</div>`);
  document.getElementById('analysisBar').innerHTML = bars.join('');

  // 지역 매칭 함수
  function regionOk(p) {
    const addr = (p.addr||p.region||'').toLowerCase();
    if(!region||region==='-'||region.includes('지역무관')||region.includes('어디든')) return 1;
    const words = region.split(/[\s·,\/]+/).filter(w=>w.length>1);
    for(const w of words) {
      if(addr.includes(w)||w.includes('상관없')) return 1;
      if(w.includes('인천')&&addr.includes('인천')) return 0.8;
      if(w.includes('서울')&&addr.includes('서울')) return 0.8;
      const gWords = ['경기','수원','파주','안산','부천','광주','화성','포천','고양','김포','오산'];
      if(gWords.some(g=>w.includes(g))&&(addr.includes('경기')||addr.includes(w.replace('경기 ','')))) return 0.8;
    }
    return 0;
  }

  // 전체 스코어링
  const scored = props.map(p => {
    if(!p.price) return null;
    let sc = 0; const why = [];
    const rOk = regionOk(p);
    sc += rOk * 30; if(rOk>0) why.push('지역 매칭');

    const mo = monthly(p.price, p.mortgage);
    const loan = (p.price||0) - (p.mortgage||0);

    // 담보실입 구조
    if(p.mortgage===0)           { sc+=28; why.push('전액대출'); }
    else if(p.mortgage<=2000)    { sc+=22; why.push('소액실입 '+p.mortgage.toLocaleString()+'만'); }
    else if(cash>=p.mortgage)    { sc+=15; why.push('현금 충당 가능'); }
    else if(cash>=p.mortgage*.6) { sc+=8;  why.push('현금 일부 가능'); }

    // 무입주
    if(wantsNoInput&&p.mortgage===0) { sc+=15; why.push('무입주 가능'); }

    // 월납입
    if(mo<=50) { sc+=10; why.push('월납입 '+mo+'만원 (적합)'); }
    else if(mo<=80) { sc+=5; why.push('월납입 '+mo+'만원'); }
    else why.push('월납입 '+mo+'만원');

    // 취득세/R/복층
    if(p.tax==='O')  { sc+=7; why.push('취득세 지원'); }
    if(p.r>0)        { sc+=5; why.push('R '+p.r.toLocaleString()+'만'); }
    if(wantsDuplex&&p.duplex==='O') { sc+=10; why.push('복층'); }
    if(noDuplex&&p.duplex==='O') sc-=15;

    // 메모 키워드
    const memo = (p.memo||'').toLowerCase();
    if(note.includes('역세권')&&(memo.includes('역세권')||memo.includes('역'))) { sc+=8; why.push('역세권'); }
    if(note.includes('gtx')&&memo.includes('gtx')) { sc+=8; why.push('GTX'); }
    if(note.includes('생애최초')&&memo.includes('생애최초')) { sc+=10; why.push('생애최초'); }
    if(note.includes('재개발')&&memo.includes('재개발')) { sc+=8; why.push('재개발'); }
    if(creditLow&&(memo.includes('어려운')||memo.includes('저신용')||p.mortgage===0)) { sc+=12; why.push('저신용 가능 구조'); }

    return {...p, sc, why, mo, loan};
  }).filter(Boolean).sort((a,b)=>b.sc-a.sc);

  // 섹션 분류
  const zeroList  = scored.filter(p=>p.mortgage===0);
  const lowList   = scored.filter(p=>p.mortgage>0&&p.mortgage<=2000);
  const midList   = scored.filter(p=>p.mortgage>2000&&p.mortgage<=5000);
  const allTop    = scored.slice(0,8);

  let out = '';

  // 신용 분석 헤더
  out += `<div style="background:rgba(0,201,167,.06);border:1px solid rgba(0,201,167,.2);border-radius:8px;padding:10px 13px;margin-bottom:10px;font-size:11px;line-height:1.9;color:var(--muted);">`;
  out += `<strong style="color:var(--teal)">📊 대출 구조 분석</strong> &nbsp; ${creditLabel}<br>`;
  if(creditOk)  out += '✅ 신축빌라 정상 진행 가능 — 감정가 활용 시 실입주금 절감 가능';
  if(creditMid) out += '⚡ <strong style="color:var(--gold)">3개월 신용 컨설팅 후 신축 진행 권장</strong> — 현재도 감정가 구조로 일부 가능';
  if(creditLow) out += '⚠️ <strong style="color:var(--red)">신용 600점 미만 — 컨설팅 3개월 필요</strong> — 현재는 구옥 추천';
  out += `<br>대출 1억 기준 월납입 <strong style="color:var(--teal)">약 50만원</strong> (원리금 균등)`;
  out += `</div>`;

  // 섹션 1: 전액대출
  if(zeroList.length) {
    out += `<div class="sec-hd sec-zero">💚 전액대출 가능 — 실입주금 0원 (${zeroList.length}건)</div>`;
    out += zeroList.slice(0,4).map((p,i)=>card(p,i,'zero')).join('');
  }

  // 섹션 2: 소액실입
  if(lowList.length) {
    out += `<div class="sec-hd sec-low">🩵 실입주금 2,000만원 이하 (${lowList.length}건)</div>`;
    out += lowList.slice(0,4).map((p,i)=>card(p,i,'low')).join('');
  }

  // 섹션 3: 신용 활용 (600+)
  if((creditOk||creditMid)&&midList.length) {
    out += `<div class="sec-hd sec-mid">💜 신용 활용 매물 — 담보실입 5,000만 이하 (${midList.length}건)</div>`;
    out += midList.slice(0,4).map((p,i)=>card(p,i,'mid')).join('');
  }

  // 섹션 4: 종합 추천
  out += `<div class="sec-hd sec-all">🎯 종합 추천 TOP ${Math.min(8,allTop.length)}건 (점수순)</div>`;
  out += allTop.map((p,i)=>card(p,i,'all')).join('');

  // 구옥 추천 (신용 낮을 때)
  if(creditLow) {
    out += `<div class="old-banner">
      ⚠️ <strong>신용점수 ${kcb}점 — 신축빌라 진행 어려려움</strong><br>
      3개월 신용 컨설팅(${kcb}점 → 약 ${kcb+200}점) 후 신축 재도전을 권장드립니다.<br>
      현재는 <strong>구옥 매물 매칭 시스템</strong>에서 이 손님의 희망지역 <strong style="color:var(--text)">${selCust.region}</strong> 으로 매칭해주세요.
    </div>`;
  }

  document.getElementById('matchScroll').innerHTML = out;
}

function card(p, i, sec) {
  const isAll = sec==='all';
  const rCls = isAll ? (i===0?'g1':i===1?'g2':i===2?'g3':'') : '';
  const emoji = isAll ? (i===0?'🥇':i===1?'🥈':i===2?'🥉':'') : '';
  const mc = p.mo<=50?'var(--green)':p.mo<=80?'var(--gold)':'var(--red)';
  const tags = [];
  if(p.mortgage===0) tags.push('<span class="tag t-gr">전액대출</span>');
  else if(p.mortgage<=2000) tags.push('<span class="tag t-te">실입'+p.mortgage.toLocaleString()+'만</span>');
  if(p.tax==='O') tags.push('<span class="tag t-gr">취득세↓</span>');
  if(p.r>0) tags.push('<span class="tag t-pu">R'+p.r.toLocaleString()+'만</span>');
  if(p.duplex==='O') tags.push('<span class="tag t-go">복층</span>');
  const memo = p.memo||'';
  if(memo.includes('GTX')||memo.includes('gtx')) tags.push('<span class="tag t-re">GTX</span>');
  if(memo.includes('역세권')||memo.includes('역')) tags.push('<span class="tag t-bl">역세권</span>');

  return `<div class="rc ${rCls}" onclick="showDetail(${p.id})">
    <div class="rc-rank">${emoji}</div>
    <div class="rc-name">${p.name}</div>
    <div class="rc-region">${p.region} ${p.addr?'· '+p.addr.slice(0,20)+'...':''}</div>
    ${isAll?`<div style="font-size:10px;color:var(--purple);margin-bottom:4px">매칭 ${p.sc}점</div>`:''}
    <div class="tags">${tags.join('')}</div>
    <div class="rc-price-row">
      <div class="rc-price">${p.price.toLocaleString()}만원</div>
      <div class="rc-monthly" style="color:${mc}">월 ${p.mo}만원</div>
    </div>
    <div class="rc-mort">담보실입 ${p.mortgage>0?p.mortgage.toLocaleString()+'만':'전액대출'} · 대출 ${p.loan.toLocaleString()}만</div>
    <div class="rc-why">${(p.why||[]).map(w=>`<div class="rc-why-item"><span class="why-dot">✓</span>${w}</div>`).join('')}</div>
  </div>`;
}

// ════════════════════════════════════════
// 매물 관리
// ════════════════════════════════════════
// ── 지역 트리 파싱 ──
// region: "인천 부평구", addr: "인천 부평구 부평동 ..." → dong 추출
function parseLevels(p) {
  const r = p.region || '';
  const parts = r.split(' ');
  const sido    = parts[0] || '기타';
  const sigungu = parts[1] || '';
  // dong: region에 없으면 addr에서 구 다음 단어
  let dong = p.dong || '';
  if (!dong && p.addr) {
    const addrParts = p.addr.split(' ');
    // "인천 부평구 갈산동 ..." 형태면 인덱스2가 동
    const guIdx = addrParts.findIndex(w => w === sigungu);
    if (guIdx >= 0 && addrParts[guIdx+1]) {
      const next = addrParts[guIdx+1];
      if (next.endsWith('동') || next.endsWith('읍') || next.endsWith('면') || next.endsWith('리')) {
        dong = next;
      }
    }
  }
  return { sido, sigungu, dong };
}

function buildRegionSidebar() {
  // 트리 구조: sido → sigungu → dong → count
  const tree = {};
  props.forEach(p => {
    const { sido, sigungu, dong } = parseLevels(p);
    if (!tree[sido]) tree[sido] = { _cnt:0, subs:{} };
    tree[sido]._cnt++;
    const sg = sigungu || '(기타)';
    if (!tree[sido].subs[sg]) tree[sido].subs[sg] = { _cnt:0, dongs:{} };
    tree[sido].subs[sg]._cnt++;
    if (dong) {
      tree[sido].subs[sg].dongs[dong] = (tree[sido].subs[sg].dongs[dong]||0)+1;
    }
  });

  const ORDER = ['인천','경기','서울','기타'];
  const sidos = Object.keys(tree).sort((a,b)=>{
    const ai=ORDER.indexOf(a), bi=ORDER.indexOf(b);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });

  let out = `<div class="ri lv1 ${!sel.sido?'sel':''}" onclick="clickSido('')">
    <div class="ri-name bold">전체 <span class="ri-arrow"></span></div>
    <div class="ri-count">${props.length}건</div>
  </div>`;

  sidos.forEach(sido => {
    const sidoData = tree[sido];
    const sidoOpen = sel.sido === sido;
    out += `<div class="ri lv1 ${sidoOpen&&!sel.sigungu?'sel':''} ${sidoOpen?'open':''}" onclick="clickSido('${sido}')">
      <div class="ri-name bold">${sido} <span class="ri-arrow">▶</span></div>
      <div class="ri-count">${sidoData._cnt}건</div>
    </div>`;

    if (sidoOpen) {
      const sgsorted = Object.keys(sidoData.subs).sort((a,b)=>sidoData.subs[b]._cnt-sidoData.subs[a]._cnt);
      sgsorted.forEach(sg => {
        const sgData = sidoData.subs[sg];
        const sgOpen = sel.sigungu === sg;
        out += `<div class="ri lv2 ${sidoOpen&&sgOpen&&!sel.dong?'sel':''} ${sgOpen?'open':''}" onclick="clickSigungu('${sg}')">
          <div class="ri-name">${sg} <span class="ri-arrow">${Object.keys(sgData.dongs).length>0?'▶':''}</span></div>
          <div class="ri-count">${sgData._cnt}건</div>
        </div>`;

        if (sgOpen && Object.keys(sgData.dongs).length > 0) {
          const dongs = Object.keys(sgData.dongs).sort((a,b)=>sgData.dongs[b]-sgData.dongs[a]);
          dongs.forEach(dong => {
            out += `<div class="ri lv3 ${sel.dong===dong?'sel':''}" onclick="clickDong('${dong}')">
              <div class="ri-name" style="font-size:11px">${dong}</div>
              <div class="ri-count">${sgData.dongs[dong]}건</div>
            </div>`;
          });
        }
      });
    }
  });

  document.getElementById('regionList').innerHTML = out;
}

function clickSido(sido) {
  if (sel.sido === sido && sido !== '') {
    sel = { sido:'', sigungu:'', dong:'' };
  } else {
    sel = { sido, sigungu:'', dong:'' };
  }
  buildRegionSidebar(); renderPropGrid();
}

function clickSigungu(sg) {
  if (sel.sigungu === sg) {
    sel = { sido: sel.sido, sigungu:'', dong:'' };
  } else {
    sel = { sido: sel.sido, sigungu: sg, dong:'' };
  }
  buildRegionSidebar(); renderPropGrid();
}

function clickDong(dong) {
  sel.dong = sel.dong === dong ? '' : dong;
  buildRegionSidebar(); renderPropGrid();
}

function renderPropGrid() {
  const filt  = document.getElementById('flFilter').value;
  const kw    = document.getElementById('flKw').value.toLowerCase();
  const f = props.filter(p => {
    const addr = (p.addr||p.region||'').toLowerCase();
    // 3단계 드릴다운 필터
    if(sel.sido) {
      const { sido, sigungu, dong } = parseLevels(p);
      if(sido !== sel.sido) return false;
      if(sel.sigungu && sigungu !== sel.sigungu) return false;
      if(sel.dong && dong !== sel.dong) return false;
    }
    if(filt==='zero'  && p.mortgage!==0) return false;
    if(filt==='low'   && (p.mortgage===0||p.mortgage>2000)) return false;
    if(filt==='tax'   && p.tax!=='O') return false;
    if(filt==='duplex'&& p.duplex!=='O') return false;
    if(filt==='r'     && !p.r) return false;
    if(kw && !p.name.toLowerCase().includes(kw) && !addr.includes(kw)) return false;
    return true;
  });
  document.getElementById('propLc').innerHTML = '<strong>'+f.length+'</strong>건';
  const el = document.getElementById('propCards');
  if(!f.length) { el.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);grid-column:1/-1;">매물이 없습니다.</div>'; return; }
  el.innerHTML = f.map(p => {
    const mo = monthly(p.price, p.mortgage);
    const mc = mo<=50?'var(--green)':mo<=80?'var(--gold)':'var(--red)';
    const tags = [];
    if(p.mortgage===0) tags.push('<span class="tag t-gr">전액대출</span>');
    else if(p.mortgage<=2000) tags.push('<span class="tag t-te">실입'+p.mortgage.toLocaleString()+'만</span>');
    if(p.tax==='O') tags.push('<span class="tag t-gr">취득세↓</span>');
    if(p.r>0) tags.push('<span class="tag t-pu">R'+p.r.toLocaleString()+'만</span>');
    if(p.duplex==='O') tags.push('<span class="tag t-go">복층</span>');
    const memo = p.memo||'';
    if(memo.includes('GTX')) tags.push('<span class="tag t-re">GTX</span>');
    if(memo.includes('역세권')||memo.includes('역')) tags.push('<span class="tag t-bl">역세권</span>');
    return `<div class="pc" onclick="showDetail(${p.id})">
      <button class="pc-edit" onclick="event.stopPropagation();openPropForm(${p.id})">수정</button>
      <div class="pc-region">${p.region}</div>
      <div class="pc-name">${p.name}</div>
      <div class="pc-addr">${p.addr||'주소 미등록'}</div>
      <div class="pc-price">${p.price?p.price.toLocaleString():'?'}만원</div>
      <div class="pc-monthly" style="color:${mc}">월 ${mo}만원</div>
      <div class="pc-mort">담보실입 ${p.mortgage>0?p.mortgage.toLocaleString()+'만':'전액대출'} · 대출 ${((p.price||0)-(p.mortgage||0)).toLocaleString()}만</div>
      <div class="pc-tags">${tags.join('')}</div>
    </div>`;
  }).join('');
}

// ── 매물 폼 ──
function openPropForm(id) {
  const p = id ? props.find(x=>x.id===id) : null;
  document.getElementById('pfcTitle').textContent = p ? '✏️ 수정' : '➕ 신규 등록';
  document.getElementById('pfDelBtn').style.display = p ? '' : 'none';
  document.getElementById('pfId').value = p?.id||'';
  document.getElementById('pfRegion').value = p?.region||'';
  document.getElementById('pfName').value = p?.name||'';
  document.getElementById('pfAddr').value = p?.addr||'';
  document.getElementById('pfDong').value = p?.dong||'';
  document.getElementById('pfType').value = p?.type||'쓰리룸';
  document.getElementById('pfPrice').value = p?.price||'';
  document.getElementById('pfMort').value = p?.mortgage||'';
  document.getElementById('pfR').value = p?.r||'';
  document.getElementById('pfMemo').value = p?.memo||'';
  setOX2('pfDuplex', p?.duplex||'X');
  setOX2('pfTax', p?.tax||'X');
  updateMonthly();
}

function updateMonthly() {
  const price = parseInt(document.getElementById('pfPrice').value)||0;
  const mort  = parseInt(document.getElementById('pfMort').value)||0;
  const mo    = monthly(price, mort);
  const el    = document.getElementById('monthlyHint');
  if(price) {
    const mc = mo<=50?'var(--green)':mo<=80?'var(--gold)':'var(--red)';
    el.innerHTML = `<span style="color:${mc}">월 ${mo}만원</span> (대출 ${((price-mort)||0).toLocaleString()}만)<small>기준: 대출 1억 = 월 50만원</small>`;
  } else el.innerHTML = '월납입 계산 대기<small>기준: 대출 1억 = 월 50만원</small>';
}

function setOX(btn) {
  const f = btn.dataset.f;
  btn.closest('.ox').querySelectorAll('.ox-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(f).value = btn.classList.contains('o')?'O':'X';
}
function setOX2(fieldId, val) {
  document.getElementById(fieldId).value = val;
  const grp = document.getElementById(fieldId).previousElementSibling;
  if(!grp?.classList.contains('ox')) return;
  grp.querySelectorAll('.ox-btn').forEach(b=>{
    b.classList.remove('on');
    if((val==='O'&&b.classList.contains('o'))||(val==='X'&&b.classList.contains('x'))) b.classList.add('on');
  });
}

function saveProp() {
  const region = document.getElementById('pfRegion').value.trim();
  const name   = document.getElementById('pfName').value.trim();
  const price  = parseInt(document.getElementById('pfPrice').value)||0;
  if(!region||!name||!price) { toast('지역, 단지명, 분양가는 필수입니다.',true); return; }
  const editId = document.getElementById('pfId').value;
  const mo = monthly(price, parseInt(document.getElementById('pfMort').value)||0);
  const p = {
    id: editId ? parseInt(editId) : nxtId++,
    region, addr: document.getElementById('pfAddr').value,
    name, type: document.getElementById('pfType').value,
    dong: document.getElementById('pfDong').value.trim(),
    price, mortgage: parseInt(document.getElementById('pfMort').value)||0,
    tax: document.getElementById('pfTax').value,
    r: parseInt(document.getElementById('pfR').value)||0,
    duplex: document.getElementById('pfDuplex').value,
    memo: document.getElementById('pfMemo').value,
    monthly: mo,
  };
  if(editId) { const i=props.findIndex(x=>x.id===parseInt(editId)); if(i>=0) props[i]=p; else props.push(p); }
  else props.push(p);
  saveProps(); buildRegionSidebar(); renderPropGrid();
  toast(editId?'✅ 수정되었습니다!':'✅ 저장되었습니다!');
  openPropForm(null);
}

function delProp() {
  const id = parseInt(document.getElementById('pfId').value); if(!id) return;
  document.getElementById('cfmMsg').textContent = '이 매물을 삭제할까요?';
  document.getElementById('cfmBg').classList.add('on');
  document.getElementById('cfmOk').onclick = () => {
    props = props.filter(p=>p.id!==id);
    saveProps(); buildRegionSidebar(); renderPropGrid(); openPropForm(null);
    document.getElementById('cfmBg').classList.remove('on');
    toast('🗑️ 삭제되었습니다.');
  };
}

// ── 상세 모달 ──
function showDetail(id) {
  const p = props.find(x=>x.id===id); if(!p) return;
  const mo = monthly(p.price, p.mortgage);
  const mc = mo<=50?'var(--green)':mo<=80?'var(--gold)':'var(--red)';
  document.getElementById('modalContent').innerHTML =
    `<div style="font-size:17px;font-weight:900;color:var(--teal);margin-bottom:3px">${p.name}</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px">${p.addr||p.region}</div>
    <div style="background:linear-gradient(135deg,rgba(0,201,167,.2),rgba(0,180,216,.1));border:1px solid rgba(0,201,167,.3);border-radius:8px;padding:14px;text-align:center;margin-bottom:12px;">
      <div style="font-size:10px;color:var(--muted);margin-bottom:2px">분양가</div>
      <div style="font-size:26px;font-weight:900;color:var(--teal)">${p.price?p.price.toLocaleString():'?'}만원</div>
      <div style="font-size:12px;font-weight:700;color:${mc};margin-top:3px">월납입 약 ${mo}만원</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">담보실입 ${p.mortgage>0?p.mortgage.toLocaleString()+'만':'전액대출'} · 대출 ${((p.price||0)-(p.mortgage||0)).toLocaleString()}만</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;">
      <div style="background:var(--card);border-radius:6px;padding:8px 10px;"><div style="font-size:9px;color:var(--muted)">취득세</div><div style="font-size:12px;font-weight:700;color:${p.tax==='O'?'var(--green)':'var(--muted)'}">${p.tax==='O'?'✓ 지원':'미지원'}</div></div>

function loadPropXlsx(input) {
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    if(typeof XLSX==='undefined'){toast('잠시 후 다시 시도하세요.',true);return;}
    const wb=XLSX.read(e.target.result,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    let hRow=-1;
    for(let i=0;i<Math.min(5,raw.length);i++){
      if(raw[i].some(c=>String(c).includes('단지명')||String(c).includes('분양가'))){hRow=i;break;}
    }
    if(hRow<0){toast('헤더를 찾을 수 없습니다.',true);return;}
    const hs=raw[hRow].map(h=>String(h).trim());
    const get=(row,nm)=>{const i=hs.findIndex(h=>h.includes(nm));return i>=0?String(row[i]||'').trim():'';};
    const ti=v=>{const n=parseInt(String(v).replace(/,/g,''));return isNaN(n)?0:n;};
    props=[];
    for(let i=hRow+1;i<raw.length;i++){
      const row=raw[i];
      if(row.every(c=>c===''||c===null)) continue;
      const name=get(row,'단지명'); if(!name) continue;
      const price=ti(get(row,'분양가')), mort=ti(get(row,'담보실입'));
      props.push({id:i,region:get(row,'지역'),addr:get(row,'주소'),name,type:get(row,'타입')||'쓰리룸',price,mortgage:mort,
        tax:get(row,'취득세지원'),r:ti(get(row,'R금액실제')||get(row,'R금액(×100만원)')?ti(get(row,'R금액실제')):0),
        duplex:get(row,'복층'),memo:(get(row,'비고')||'').slice(0,120),monthly:monthly(price,mort)});
    }
    saveProps(); buildRegionSidebar(); renderPropGrid();
    toast(`✓ ${props.length}개 매물 불러오기 완료`);
  };
  r.readAsArrayBuffer(file); input.value='';
}

function loadCustXlsx(input) {
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    if(typeof XLSX==='undefined'){toast('잠시 후 다시 시도하세요.',true);return;}
    const wb=XLSX.read(e.target.result,{type:'array'});
    let loaded=0;
    wb.SheetNames.forEach(sn=>{
      const ws=wb.Sheets[sn];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let hRow=-1;
      for(let i=0;i<Math.min(5,raw.length);i++){
        if(raw[i].some(c=>String(c).includes('연락처'))){hRow=i;break;}
      }
      if(hRow<0) return;
      const hs=raw[hRow].map(h=>String(h).trim());
      const get=(row,nm)=>{const i=hs.findIndex(h=>h.includes(nm));return i>=0?String(row[i]||'').trim():'';};
      for(let i=hRow+1;i<raw.length;i++){
        const row=raw[i];
        if(row.every(c=>c===''||c===null)) continue;
        const phone=get(row,'연락처');
        if(!phone||phone==='연락처') continue;
        if(custs.find(c=>c.phone===phone)) continue;
        custs.push({id:Date.now()+i,no:get(row,'No')||String(i),date:get(row,'문의일'),phone,
          channel:get(row,'유입')||get(row,'채널'),region:get(row,'희망지역'),
          kcb:get(row,'KCB')||get(row,'신용점수(KCB)'),debt:get(row,'기대출'),
          cash:get(row,'가용현금'),noinput:get(row,'무입주'),income:get(row,'소득'),
          note:get(row,'특이사항')||get(row,'통화내용')||get(row,'조건'),
          schedule:get(row,'이사일정'),priority:get(row,'우선순위'),status:get(row,'관리현황')||get(row,'현황')});
        loaded++;
      }
    });
    saveCusts(); renderCustList(); renderCustDB();
    toast(`✓ ${loaded}명 불러오기 완료`);
  };
  r.readAsArrayBuffer(file); input.value='';
}

function renderCustDB() {
  const pri=document.getElementById('cdbPri').value;
  const kw=document.getElementById('cdbKw').value.toLowerCase();
  const f=custs.filter(c=>{
    if(pri&&!(c.priority||'').includes(pri)) return false;
    if(kw&&!c.phone.includes(kw)&&!(c.region||'').toLowerCase().includes(kw)&&!(c.note||'').toLowerCase().includes(kw)) return false;
    return true;
  });
  document.getElementById('cdbLc').innerHTML='<strong>'+f.length+'</strong>명';
  const tb=document.getElementById('custBody');
  if(!f.length){tb.innerHTML='<tr><td colspan="13" style="text-align:center;padding:30px;color:var(--muted)">없음</td></tr>';return;}
  const pc=p=>p.includes('🔴')?'color:var(--red)':p.includes('🟠')?'color:var(--orange)':p.includes('🟡')?'color:var(--gold)':'color:var(--muted)';
  tb.innerHTML=f.map(c=>`<tr onclick="selectCust(${c.id});goTab('match',document.getElementById('tabMatch'))">
    <td style="color:var(--muted)">${c.no}</td><td style="color:var(--muted)">${c.date||'-'}</td>
    <td style="font-weight:700">${c.phone}</td><td style="font-size:10px;color:var(--muted)">${c.channel||'-'}</td>
    <td>${c.region||'-'}</td><td style="font-size:11px">${c.kcb||'-'}</td>
    <td style="font-size:10px;color:var(--muted)">${c.debt||'-'}</td><td style="font-size:10px;color:var(--muted)">${c.cash||'-'}</td>
    <td>${c.noinput==='O'?'<span style="color:var(--green);font-weight:700">O</span>':c.noinput||'-'}</td>
    <td style="font-weight:700;${pc(c.priority||'')}">${c.priority||'-'}</td>
    <td style="font-size:10px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.note||'-'}</td>
    <td style="font-size:10px;color:var(--muted)">${c.schedule||'-'}</td>
    <td style="font-size:10px;color:var(--gold)">${c.status||'-'}</td>
  </tr>`).join('');
}

const COORDS = {
  '인천 부평구':[37.508,126.722],'인천 미추홀구':[37.455,126.660],
  '인천 남동구':[37.449,126.731],'인천 서구':[37.544,126.673],
  '인천 계양구':[37.537,126.738],'인천 중구':[37.474,126.622],
  '인천 연수구':[37.410,126.679],'인천':[37.456,126.705],
  '서울 동대문구':[37.574,127.040],'서울 금천구':[37.457,126.895],
  '서울 강북구':[37.640,127.012],'서울 은평구':[37.602,126.930],'서울':[37.560,126.975],
  '경기 수원시':[37.264,127.029],'경기 안산시':[37.322,126.831],
  '경기 파주시':[37.760,126.780],'경기 광주시':[37.430,127.255],
  '경기 부천시':[37.504,126.766],'경기 화성시':[37.200,126.830],
  '경기 포천시':[37.894,127.200],'경기 고양시':[37.658,126.832],
  '경기 김포시':[37.615,126.716],'경기 오산시':[37.150,127.077],'경기':[37.400,127.000],
};

function getCoords(p) {
  const addr = p.addr||p.region||'';
  for(const [key,c] of Object.entries(COORDS)){
    if(addr.includes(key)) return [c[0]+(Math.random()-.5)*.006, c[1]+(Math.random()-.5)*.006];
  }
  return [37.47+(Math.random()-.5)*.05, 126.73+(Math.random()-.5)*.05];
}

function mkIcon(clr, active, lbl) {
  const l = (lbl||'신축').slice(0,2);
  return L.divIcon({
    html: active
      ? `<div style="animation:bounce .4s ease"><svg width="44" height="54" viewBox="0 0 44 54" xmlns="http://www.w3.org/2000/svg"><circle cx="22" cy="21" r="20" fill="${clr}" opacity=".15"/><path d="M22 3C12.6 3 5 10.6 5 19c0 6 3.1 11.3 7.7 14.6L22 52l9.3-18.4C36.9 30.3 39 25 39 19 39 10.6 31.4 3 22 3z" fill="${clr}" stroke="#e63946" stroke-width="3"/><circle cx="22" cy="19" r="9.5" fill="white" opacity=".95"/><text x="22" y="22.5" text-anchor="middle" font-size="7.5" font-weight="bold" fill="${clr}" font-family="Arial">${l}</text></svg></div>`
      : `<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.268 0 0 6.268 0 14c0 4.667 2.333 8.867 5.833 11.433L14 36l8.167-10.567C25.667 22.867 28 18.667 28 14 28 6.268 21.732 0 14 0z" fill="${clr}"/><circle cx="14" cy="14" r="7" fill="white" opacity=".9"/><text x="14" y="17.5" text-anchor="middle" font-size="7" font-weight="bold" fill="${clr}" font-family="Arial">${l}</text></svg>`,
    className:'', iconSize:active?[44,54]:[28,36], iconAnchor:active?[22,54]:[14,36]
  });
}

function initMap() {
  if(leafMap) return;
  leafMap = L.map('mapEl',{center:[37.47,126.73],zoom:11});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:20
  }).addTo(leafMap);
}

function setMapF(val,btn){
  mapFilter=val;
  document.querySelectorAll('#mapFilter .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on'); renderMap();
}

function renderMap(){
  if(!leafMap) return;
  Object.values(markers).forEach(m=>leafMap.removeLayer(m));
  markers={}; activeId=null;
  const regF=document.getElementById('mapRegF').value;
  const filtered=props.filter(p=>{
    if(regF&&!(p.addr||p.region||'').includes(regF)) return false;
    if(mapFilter==='zero'&&p.mortgage!==0) return false;
    if(mapFilter==='tax'&&p.tax!=='O') return false;
    if(mapFilter==='duplex'&&p.duplex!=='O') return false;
    return true;
  });

  // 왼쪽 목록
  document.getElementById('mapPropList').innerHTML = filtered.map(p=>{
    const mo=monthly(p.price,p.mortgage);
    const mc=mo<=50?'var(--green)':mo<=80?'var(--gold)':'var(--red)';
    return `<div class="mpi" onclick="focusMarker(${p.id})">
      <div class="mpi-name">${p.name}</div>
      <div class="mpi-region">${p.region}</div>
      <div class="mpi-price">${p.price?p.price.toLocaleString()+'만':'-'}
        <span style="font-size:10px;color:${mc};margin-left:4px">월${mo}만</span>
        ${p.mortgage===0?'<span style="font-size:9px;color:var(--green);margin-left:3px">전액대출</span>':''}
        ${p.tax==='O'?'<span style="font-size:9px;color:var(--green);margin-left:3px">취득세↓</span>':''}
      </div>
    </div>`;
  }).join('');

  // 마커
  const bounds=[];
  filtered.forEach(p=>{
    const coords=getCoords(p);
    p._c=coords; bounds.push(coords);
    const clr = p.mortgage===0?'#2dc653':p.tax==='O'?'#00c9a7':p.r>0?'#9b5de5':'#7a9cc0';
    const lbl = p.name.slice(0,2);
    const m = L.marker(coords,{icon:mkIcon(clr,false,lbl)}).addTo(leafMap);
    m.on('click',()=>{
      if(activeId&&markers[activeId]&&activeId!==p.id){
        const prev=props.find(x=>x.id===activeId);
        if(prev){const pc=prev.mortgage===0?'#2dc653':prev.tax==='O'?'#00c9a7':prev.r>0?'#9b5de5':'#7a9cc0';markers[activeId].setIcon(mkIcon(pc,false,prev.name.slice(0,2)));markers[activeId].setZIndexOffset(0);}
      }
      activeId=p.id; m.setIcon(mkIcon(clr,true,lbl)); m.setZIndexOffset(9999);
      leafMap.setView(coords,Math.max(leafMap.getZoom(),15),{animate:true});
      showMapDetail(p.id);
    });
    markers[p.id]=m;
  });
  if(bounds.length>1) leafMap.fitBounds(bounds,{padding:[30,30]});
  else if(bounds.length===1) leafMap.setView(bounds[0],14);
}

function focusMarker(id){
  const p=props.find(x=>x.id===id); if(!p) return;
  const coords=p._c||getCoords(p);
  if(activeId&&markers[activeId]&&activeId!==id){
    const prev=props.find(x=>x.id===activeId);
    if(prev){const pc=prev.mortgage===0?'#2dc653':prev.tax==='O'?'#00c9a7':prev.r>0?'#9b5de5':'#7a9cc0';markers[activeId].setIcon(mkIcon(pc,false,prev.name.slice(0,2)));markers[activeId].setZIndexOffset(0);}
  }
  activeId=id;
  const clr=p.mortgage===0?'#2dc653':p.tax==='O'?'#00c9a7':p.r>0?'#9b5de5':'#7a9cc0';
  if(markers[id]){markers[id].setIcon(mkIcon(clr,true,p.name.slice(0,2)));markers[id].setZIndexOffset(9999);}
  leafMap.flyTo(coords,16,{animate:true,duration:0.6});
  showMapDetail(id);
}

function showMapDetail(id){
  const p=props.find(x=>x.id===id); if(!p) return;
  const mo=monthly(p.price,p.mortgage);
  const mc=mo<=50?'var(--green)':mo<=80?'var(--gold)':'var(--red)';
  const col=document.getElementById('mapDetailCol');
  col.classList.add('on');
  document.getElementById('mdcBody').innerHTML =
    `<div style="font-size:15px;font-weight:900;color:var(--teal);margin-bottom:3px;padding-right:30px">${p.name}</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:12px">${p.addr||p.region}</div>
    <div style="background:linear-gradient(135deg,rgba(0,201,167,.2),rgba(0,180,216,.1));border:1px solid rgba(0,201,167,.3);border-radius:8px;padding:12px;text-align:center;margin-bottom:10px;">
      <div style="font-size:10px;color:var(--muted)">분양가</div>
      <div style="font-size:22px;font-weight:900;color:var(--teal)">${p.price?p.price.toLocaleString():'?'}만</div>
      <div style="font-size:12px;font-weight:700;color:${mc};margin-top:2px">월 ${mo}만원</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">담보실입 ${p.mortgage>0?p.mortgage.toLocaleString()+'만':'전액대출'}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px;">
      <div style="background:var(--card);border-radius:6px;padding:7px 9px;"><div style="font-size:9px;color:var(--muted)">취득세</div><div style="font-size:12px;font-weight:700;color:${p.tax==='O'?'var(--green)':'var(--muted)'}">${p.tax==='O'?'✓ 지원':'미지원'}</div></div>
      <div style="background:var(--card);border-radius:6px;padding:7px 9px;"><div style="font-size:9px;color:var(--muted)">복층</div><div style="font-size:12px;font-weight:700;color:${p.duplex==='O'?'var(--gold)':'var(--muted)'}">${p.duplex==='O'?'복층':'일반'}</div></div>
      <div style="background:var(--card);border-radius:6px;padding:7px 9px;"><div style="font-size:9px;color:var(--muted)">R</div><div style="font-size:12px;font-weight:700;color:var(--purple)">${p.r>0?p.r.toLocaleString()+'만':'-'}</div></div>
      <div style="background:var(--card);border-radius:6px;padding:7px 9px;"><div style="font-size:9px;color:var(--muted)">타입</div><div style="font-size:12px;font-weight:700">${p.type}</div></div>
    </div>
    ${p.memo?`<div style="background:rgba(244,164,66,.08);border:1px solid rgba(244,164,66,.2);border-radius:7px;padding:8px 10px;font-size:10px;color:var(--gold);line-height:1.6;margin-bottom:8px;">${p.memo}</div>`:''}`;
  const btn=document.createElement('button');
  btn.style.cssText='background:var(--blue);border:none;color:#fff;border-radius:7px;padding:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;';
  btn.textContent='🗺️ 네이버지도 위치 확인';
  btn.onclick=()=>window.open('https://map.naver.com/p/search/'+encodeURIComponent(p.addr||p.name),'_blank');
  document.getElementById('mdcBody').appendChild(btn);
}

function doExport(){
  if(typeof XLSX==='undefined'){toast('잠시 후 다시 시도하세요.',true);return;}
  if(!props.length){toast('매물이 없습니다.',true);return;}
  const h=['지역','단지명','주소','타입','분양가(만원)','담보실입(만원)','월납입(만원)','취득세지원','R(만원)','복층','특징','마커설명'];
  const rows=props.map(p=>{
    const mo=monthly(p.price,p.mortgage);
    return[p.region,p.name,p.addr||p.region,p.type,p.price,p.mortgage,mo,p.tax,p.r,p.duplex,p.memo,
      (p.price?p.price.toLocaleString():'?')+'만 | 월'+mo+'만 | 담보실입'+(p.mortgage>0?p.mortgage.toLocaleString()+'만':'전액대출')+(p.r>0?' | R'+p.r.toLocaleString()+'만':'')+(p.tax==='O'?' | 취득세↓':'')+(p.duplex==='O'?' | 복층':'')];
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([h,...rows]);
  ws['!cols']=[12,20,30,8,13,13,10,8,10,6,25,45].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws,'신축빌라');
  const ws2=XLSX.utils.aoa_to_sheet([h,...rows.filter((_,i)=>props[i].mortgage===0)]);
  ws2['!cols']=ws['!cols'];
  XLSX.utils.book_append_sheet(wb,ws2,'전액대출');
  XLSX.writeFile(wb,'돌고래_신축_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('엑셀 저장 완료 ✓');
}

function toast(msg,isErr){
  const el=document.getElementById('toastEl');
  el.textContent=msg;
  el.className='toast'+(isErr?' err':'')+' show';
  setTimeout(()=>el.classList.remove('show'),2500);
}

updateStats();
renderCustList();
buildRegionSidebar();
renderPropGrid();
